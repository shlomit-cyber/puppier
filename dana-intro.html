<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workfully - היכרות עם דנה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#309C8D',
                        'primary-dark': '#277f73',
                        'primary-light': '#e8f5f3',
                        secondary: '#C43E66',
                        accent: '#DB8A16',
                    },
                    fontFamily: {
                        sans: ['PauzaBook', 'Inter', 'sans-serif'],
                        light: ['PauzaLight', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'PauzaBook';
            src: url('fonts/PauzaBook.woff2') format('woff2'),
                 url('fonts/PauzaBook.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'PauzaLight';
            src: url('fonts/PauzaLight.woff2') format('woff2'),
                 url('fonts/PauzaLight.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        html { font-size: 17px; }
        * { font-family: 'PauzaBook', 'Inter', sans-serif; }
        h1, h2, h3 { letter-spacing: 0.04em; font-weight: 700; }
        p, .font-light { font-family: 'PauzaLight', 'Inter', sans-serif; font-weight: 700; }
        body { min-height: 100vh; }

        .lang-btn { transition: all 0.2s ease; }
        .lang-btn.active { background-color: #309C8D; color: white; }
        .lang-btn:not(.active):hover { background-color: #e8f5f3; }

        input:focus { outline: none; border-color: #309C8D; box-shadow: 0 0 0 3px rgba(48, 156, 141, 0.12); }

        .fade-up { animation: fadeUp 0.6s ease forwards; opacity: 0; }
        .fade-up-delay-1 { animation-delay: 0.15s; }
        .fade-up-delay-2 { animation-delay: 0.3s; }
        .fade-up-delay-3 { animation-delay: 0.45s; }
        .fade-up-delay-4 { animation-delay: 0.6s; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-ring {
            background: conic-gradient(#309C8D 0deg, #309C8D 270deg, #e2e8f0 270deg, #e2e8f0 360deg);
        }
    </style>
</head>
<body class="bg-white flex flex-col lg:flex-row min-h-screen">

    <!-- Left Panel - Dana Photo (desktop) / Top (mobile) -->
    <div class="lg:w-[42%] bg-gray-50 flex flex-col items-center justify-center p-8 lg:p-12 relative">
        <!-- Logo -->
        <div class="absolute top-6 right-6">
            <img src="logo.png" alt="Workfully" class="h-12">
        </div>

        <!-- Online indicator -->
        <div class="absolute top-6 left-6 flex items-center gap-2">
            <span class="w-2.5 h-2.5 bg-primary rounded-full animate-pulse"></span>
            <span class="text-sm text-gray-400">מחוברת</span>
        </div>

        <!-- Dana Avatar -->
        <div class="mt-16 lg:mt-0 fade-up">
            <div class="relative">
                <!-- Outer ring -->
                <div class="w-52 h-52 sm:w-60 sm:h-60 lg:w-72 lg:h-72 rounded-full avatar-ring p-1.5 mx-auto">
                    <div class="w-full h-full rounded-full bg-gray-200 overflow-hidden">
                        <!-- Placeholder for Dana's photo - in production replace with actual image -->
                        <div class="w-full h-full bg-gradient-to-b from-gray-100 to-gray-200 flex items-center justify-center">
                            <svg class="w-24 h-24 text-gray-300" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <!-- Status badge -->
                <div class="absolute bottom-3 right-3 lg:bottom-4 lg:right-4 w-10 h-10 bg-primary rounded-full border-4 border-gray-50 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
            </div>
        </div>

        <!-- Dana name under photo (mobile only) -->
        <p class="lg:hidden text-primary font-bold text-xl mt-4 fade-up fade-up-delay-1">דנה, המנחה הדיגיטלית שלך</p>
    </div>

    <!-- Right Panel - Content -->
    <div class="lg:w-[58%] flex flex-col justify-center px-6 sm:px-10 lg:px-16 xl:px-24 py-10 lg:py-0">
        <div class="max-w-lg mx-auto w-full">

            <!-- Greeting -->
            <div class="mb-10 fade-up fade-up-delay-1">
                <h1 class="text-3xl sm:text-4xl text-primary mb-4 leading-snug">היי, אני דנה :)</h1>
                <p class="text-gray-600 text-lg sm:text-xl leading-relaxed">
                    אני אלווה אותך בתהליך שיעזור לנו להבין יחד מה מניע אותך ומה מייחד אותך בעבודה.
                    <br><br>
                    קוראים לזה ה-<strong class="text-gray-800">DNA התעסוקתי</strong> שלך. נתחיל לזהות מהו, שלב אחרי שלב.
                </p>
            </div>

            <!-- Form -->
            <div class="space-y-6">
                <!-- Name field -->
                <div class="fade-up fade-up-delay-2">
                    <label class="block text-gray-700 font-semibold mb-2 text-base">באיזה שם לפנות אליך?</label>
                    <input
                        type="text"
                        placeholder="שם"
                        class="w-full px-5 py-3.5 border-2 border-gray-200 rounded-xl text-lg bg-white transition-all placeholder:text-gray-300"
                    >
                </div>

                <!-- Language selection -->
                <div class="fade-up fade-up-delay-3">
                    <label class="block text-gray-700 font-semibold mb-3 text-base">ובאיזו שפה?</label>
                    <div class="flex gap-3">
                        <button onclick="selectLang(this)" class="lang-btn active flex-1 py-3 px-4 rounded-xl border-2 border-primary text-base font-medium transition-all">
                            עברית
                        </button>
                        <button onclick="selectLang(this)" class="lang-btn flex-1 py-3 px-4 rounded-xl border-2 border-gray-200 text-gray-500 text-base font-medium transition-all">
                            EN
                        </button>
                        <button onclick="selectLang(this)" class="lang-btn flex-1 py-3 px-4 rounded-xl border-2 border-gray-200 text-gray-500 text-base font-medium transition-all">
                            عربي
                        </button>
                    </div>
                </div>

                <!-- CTA Button -->
                <div class="pt-4 fade-up fade-up-delay-4">
                    <button class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-4 px-8 rounded-xl text-lg transition-all hover:scale-[1.01] active:scale-[0.99]">
                        בואו נתחיל
                    </button>
                    <p class="text-center text-sm text-gray-400 mt-3">התהליך לוקח בין שעה לארבע שעות</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function selectLang(btn) {
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.remove('border-primary');
                b.classList.add('border-gray-200', 'text-gray-500');
            });
            btn.classList.add('active', 'border-primary');
            btn.classList.remove('border-gray-200', 'text-gray-500');
        }
    </script>
</body>
</html>

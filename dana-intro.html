<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workfully - היכרות עם דנה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#309C8D',
                        'primary-dark': '#277f73',
                    },
                    fontFamily: {
                        sans: ['PauzaBook', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'PauzaBook';
            src: url('fonts/PauzaBook.woff2') format('woff2'),
                 url('fonts/PauzaBook.woff') format('woff');
            font-weight: normal; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'PauzaLight';
            src: url('fonts/PauzaLight.woff2') format('woff2'),
                 url('fonts/PauzaLight.woff') format('woff');
            font-weight: normal; font-style: normal; font-display: swap;
        }
        * { font-family: 'PauzaBook', 'Inter', sans-serif; }
        p { font-family: 'PauzaLight', 'Inter', sans-serif; font-weight: 700; }
        body { min-height: 100vh; }
        input:focus { outline: none; border-color: #309C8D; }
    </style>
</head>
<body class="bg-white flex min-h-screen">

    <!-- Left side - Dana photo area -->
    <div class="w-[38%] bg-gray-50 relative flex items-center justify-center">
        <!-- Logo top-right -->
        <div class="absolute top-5 right-5">
            <img src="logo.png" alt="Workfully" class="h-10">
        </div>

        <!-- Online dot bottom-left -->
        <div class="absolute bottom-6 left-6">
            <span class="w-3 h-3 bg-primary rounded-full block"></span>
        </div>

        <!-- Dana Avatar - centered vertically, shifted slightly up and toward center -->
        <div class="relative -ml-10" style="margin-top: -5%;">
            <!-- Teal ring -->
            <div class="w-56 h-56 rounded-full border-[4px] border-primary p-1">
                <!-- Photo circle -->
                <div class="w-full h-full rounded-full bg-gray-200 overflow-hidden">
                    <!-- Placeholder - replace with actual Dana photo -->
                    <div class="w-full h-full bg-gradient-to-b from-gray-100 to-gray-200 flex items-center justify-center">
                        <svg class="w-20 h-20 text-gray-300" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right side - Content area -->
    <div class="w-[62%] flex flex-col justify-center px-14 py-10">
        <div class="max-w-md">

            <!-- Greeting -->
            <h1 class="text-2xl text-primary mb-5 font-bold">היי, אני דנה :)</h1>
            <p class="text-gray-600 text-base leading-relaxed mb-10">
                אני אלווה אותך בתהליך שיעזור לנו להבין יחד מה מניע אותך
                ומה מייחד אותך בעבודה.
                <br>
                קוראים לזה ה- DNA התעסוקתי שלך. נתחיל לזהות מהו, שלב אחרי שלב.
            </p>

            <!-- Name field -->
            <div class="mb-6">
                <label class="block text-gray-600 text-sm mb-1.5">באיזה שם לפנות אליך?</label>
                <input
                    type="text"
                    placeholder="שם"
                    class="w-72 px-4 py-2.5 border border-gray-300 rounded-lg text-base bg-white"
                >
            </div>

            <!-- Language selection -->
            <div class="mb-8">
                <label class="block text-gray-600 text-sm mb-2">ובאיזו שפה?</label>
                <div class="flex gap-4 items-center">
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="radio" name="lang" value="he" checked class="accent-primary w-4 h-4">
                        <span class="text-sm text-gray-700">עב</span>
                    </label>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="radio" name="lang" value="en" class="accent-primary w-4 h-4">
                        <span class="text-sm text-gray-700">EN</span>
                    </label>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="radio" name="lang" value="ar" class="accent-primary w-4 h-4">
                        <span class="text-sm text-gray-700">عربي</span>
                    </label>
                </div>
            </div>

            <!-- CTA Button -->
            <button class="bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-16 rounded-lg text-base transition-all">
                להתחיל
            </button>
        </div>
    </div>

</body>
</html>
